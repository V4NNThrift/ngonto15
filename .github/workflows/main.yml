name: Yanzz Windows VPS System (Ultimate Bot Edition)

on:
  workflow_dispatch:

jobs:
  windows-vps:
    runs-on: windows-latest
    timeout-minutes: 3600

    steps:
      - name: Set Timezone ke Indonesia (WIB)
        run: Set-TimeZone -Id "SE Asia Standard Time"

      - name: Konfigurasi Password Akun RDP
        run: net user runneradmin Evan123456

      - name: Install Node.js & PM2 (Bot Environment)
        uses: actions/setup-node@v3
        with:
          node-version: '20'
      - name: Install PM2 Global
        run: npm install -g pm2

      - name: Install Software (FFmpeg & VB-Cable Saja)
        run: |
          choco install ffmpeg -y
          choco install vb-cable -y

      - name: Optimasi Windows (Mode Super Ringan)
        run: |
          reg add "HKEY_CURRENT_USER\Control Panel\Colors" /v Background /t REG_SZ /d "0 0 0" /f >nul
          reg add "HKEY_CURRENT_USER\Control Panel\Desktop" /v Wallpaper /t REG_SZ /d "" /f >nul
          reg add "HKCU\Software\Microsoft\Windows\CurrentVersion\Explorer\VisualEffects" /v VisualFXSetting /t REG_DWORD /d 2 /f >nul
          powercfg -setactive 8c5e7fda-e8bf-4a96-9a85-a6e23a8c635c >nul

      - name: Setup Jaringan Tailscale
        run: |
          Invoke-WebRequest -Uri "https://pkgs.tailscale.com/stable/tailscale-setup-latest.exe" -OutFile "tailscale-setup.exe"
          Start-Process -FilePath ".\tailscale-setup.exe" -ArgumentList "/quiet" -Wait
          & "C:\Program Files\Tailscale\tailscale.exe" up --authkey=${{ secrets.TAILSCALE_AUTH_KEY }} --hostname=gh-windows-${env:GITHUB_RUN_ID}
          $TS_IP = & "C:\Program Files\Tailscale\tailscale.exe" ip -4
          echo "TS_IP=$TS_IP" >> $env:GITHUB_ENV

      - name: Merakit & Menyalakan Telegram Bot VIP (Fixed 100%)
        run: |
          mkdir C:\TelegramBot
          cd C:\TelegramBot
          npm init -y
          npm install node-telegram-bot-api
          
          # Menggunakan kode JS polos murni tanpa simbol yang memicu error PowerShell
          $botCode = @"
          const TelegramBot = require('node-telegram-bot-api');
          const { spawn } = require('child_process');
          const os = require('os');
          
          const token = '${{ secrets.TELEGRAM_TOKEN }}';
          const myChatId = '${{ secrets.TELEGRAM_CHAT_ID }}';
          const streamKey = '0ahd-k6zv-xuez-ww2r-4mjf';
          const tsIP = '${{ env.TS_IP }}';
          
          const bot = new TelegramBot(token, {polling: true});
          let ffmpegProcess = null;
          let botState = 'idle';
          
          const menuUtama = {
              reply_markup: {
                  inline_keyboard: [
                      [{ text: '▶️ Mulai Streaming', callback_data: 'menu_start' }],
                      [{ text: '🛑 Stop Streaming', callback_data: 'stop_stream' }],
                      [{ text: '📊 Cek Status Server', callback_data: 'cek_status' }]
                  ]
              },
              parse_mode: 'Markdown'
          };
          
          const menuSumber = {
              reply_markup: {
                  inline_keyboard: [
                      [{ text: '📁 Dari File RDP (Lokal)', callback_data: 'src_local' }],
                      [{ text: '🌐 Dari Link (Drive/Web)', callback_data: 'src_link' }],
                      [{ text: '🔙 Batal / Kembali', callback_data: 'cancel' }]
                  ]
              },
              parse_mode: 'Markdown'
          };
          
          const welcomeMsg = '🚀 *VPS YANZZ BERHASIL ONLINE!*\n\n🌐 *IP Tailscale:* ' + tsIP + '\n👤 *User:* runneradmin\n🔑 *Pass:* Evan123456\n\n🤖 *Sistem Kontrol VIP Aktif!*\nPilih menu di bawah untuk mengontrol server lu:';
          bot.sendMessage(myChatId, welcomeMsg, menuUtama);
          
          bot.on('callback_query', (query) => {
              if(query.message.chat.id.toString() !== myChatId) return;
              const action = query.data;
              
              if (action === 'menu_start') {
                  botState = 'idle';
                  bot.editMessageText('Pilih sumber bahan video lu, Bos:', {
                      chat_id: myChatId,
                      message_id: query.message.message_id,
                      reply_markup: menuSumber.reply_markup
                  });
              } else if (action === 'src_local') {
                  botState = 'wait_local';
                  bot.sendMessage(myChatId, '📁 *Kirim lokasi file di RDP*\n(Contoh ngetiknya: C:\\\\video.mp4)', {parse_mode: 'Markdown'});
              } else if (action === 'src_link') {
                  botState = 'wait_link';
                  bot.sendMessage(myChatId, '🌐 *Kirim Direct Link atau Link Google Drive lu:*', {parse_mode: 'Markdown'});
              } else if (action === 'cancel') {
                  botState = 'idle';
                  bot.editMessageText('🤖 *Kembali ke Menu Utama.*', {
                      chat_id: myChatId,
                      message_id: query.message.message_id,
                      reply_markup: menuUtama.reply_markup,
                      parse_mode: 'Markdown'
                  });
              } else if (action === 'stop_stream') {
                  if(ffmpegProcess) {
                      ffmpegProcess.kill();
                      ffmpegProcess = null;
                      bot.sendMessage(myChatId, '🛑 *Streaming dimatikan secara paksa.*', menuUtama);
                  } else {
                      bot.sendMessage(myChatId, '⚠️ Tidak ada streaming yang sedang berjalan saat ini.', menuUtama);
                  }
              } else if (action === 'cek_status') {
                  const freeRam = (os.freemem() / 1024 / 1024 / 1024).toFixed(2);
                  const totalRam = (os.totalmem() / 1024 / 1024 / 1024).toFixed(2);
                  const uptimeHours = (os.uptime() / 3600).toFixed(1);
                  const streamStatus = ffmpegProcess ? '🟢 SEDANG LIVE' : '🔴 MATI (IDLE)';
                  
                  const statusMsg = '📊 *STATUS SERVER SAAT INI*\n\n🎥 *Status Stream:* ' + streamStatus + '\n⏱️ *Uptime Mesin:* ' + uptimeHours + ' Jam\n🧠 *Sisa RAM:* ' + freeRam + ' GB / ' + totalRam + ' GB\n⚙️ *CPU Cores:* ' + os.cpus().length + ' Core';
                                    
                  bot.sendMessage(myChatId, statusMsg, menuUtama);
              }
              bot.answerCallbackQuery(query.id);
          });
          
          bot.on('message', (msg) => {
              if(msg.chat.id.toString() !== myChatId) return;
              
              if((botState === 'wait_local' || botState === 'wait_link') && msg.text) {
                  const videoPath = msg.text;
                  botState = 'idle';
                  bot.sendMessage(myChatId, '⏳ Memproses video & menyambungkan ke YouTube...');
                  
                  if(ffmpegProcess) ffmpegProcess.kill();
                  
                  ffmpegProcess = spawn('ffmpeg', [
                      '-stream_loop', '-1',
                      '-re',
                      '-i', videoPath,
                      '-c:v', 'copy',
                      '-c:a', 'aac',
                      '-f', 'flv',
                      'rtmp://a.rtmp.youtube.com/live2/' + streamKey
                  ]);
                  
                  bot.sendMessage(myChatId, '✅ *Streaming Berhasil Berjalan!* 🚀\nVideo lu sekarang udah tayang nonstop.', menuUtama);
                  
                  ffmpegProcess.stderr.on('data', (data) => {});
                  
                  ffmpegProcess.on('close', (code) => {
                      bot.sendMessage(myChatId, '🛑 *Koneksi Terputus atau Streaming Berhenti Otomatis.*', menuUtama);
                      ffmpegProcess = null;
                  });
              } else if (!msg.text.startsWith('/')) {
                  bot.sendMessage(myChatId, 'Silakan gunakan tombol menu di bawah ini ya, Bos:', menuUtama);
              }
          });
          "@
          
          Set-Content -Path "C:\TelegramBot\bot.js" -Value $botCode -Encoding UTF8
          
          # Menyalakan bot
          pm2 start C:\TelegramBot\bot.js --name "TelegramRemoteVIP"
          
          # Menunggu 3 detik dan mengecek log (Untuk keamanan)
          Start-Sleep -Seconds 3
          pm2 logs TelegramRemoteVIP --lines 20 --nostream

      - name: Menahan Server Tetap Hidup
        run: |
          Write-Host "Server VIP berhasil berjalan. Hentikan workflow di GitHub untuk mematikan."
          ping -t 127.0.0.1 > $null
