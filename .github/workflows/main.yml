name: Yanzz Windows VPS System (Telegraf Ultimate Edition)

on:
  workflow_dispatch:

jobs:
  windows-vps:
    runs-on: windows-latest
    timeout-minutes: 3600

    steps:
      - name: Set Timezone ke Indonesia (WIB)
        run: Set-TimeZone -Id "SE Asia Standard Time"

      - name: Konfigurasi Password Akun RDP
        run: net user runneradmin Evan123456

      - name: Install Node.js & PM2 (Bot Environment)
        uses: actions/setup-node@v3
        with:
          node-version: '20'
      - name: Install PM2 Global
        run: npm install -g pm2

      - name: Install Software (FFmpeg & VB-Cable Saja)
        run: |
          choco install ffmpeg -y
          choco install vb-cable -y

      - name: Optimasi Windows (Mode Super Ringan)
        run: |
          reg add "HKEY_CURRENT_USER\Control Panel\Colors" /v Background /t REG_SZ /d "0 0 0" /f >nul
          reg add "HKEY_CURRENT_USER\Control Panel\Desktop" /v Wallpaper /t REG_SZ /d "" /f >nul
          reg add "HKCU\Software\Microsoft\Windows\CurrentVersion\Explorer\VisualEffects" /v VisualFXSetting /t REG_DWORD /d 2 /f >nul
          powercfg -setactive 8c5e7fda-e8bf-4a96-9a85-a6e23a8c635c >nul

      - name: Setup Jaringan Tailscale
        run: |
          Invoke-WebRequest -Uri "https://pkgs.tailscale.com/stable/tailscale-setup-latest.exe" -OutFile "tailscale-setup.exe"
          Start-Process -FilePath ".\tailscale-setup.exe" -ArgumentList "/quiet" -Wait
          & "C:\Program Files\Tailscale\tailscale.exe" up --authkey=${{ secrets.TAILSCALE_AUTH_KEY }} --hostname=gh-windows-${env:GITHUB_RUN_ID}
          
          # Simpan IP ke dalam file teks biar gampang dibaca oleh script bot nantinya
          $TS_IP = & "C:\Program Files\Tailscale\tailscale.exe" ip -4
          Set-Content -Path "C:\ts_ip.txt" -Value $TS_IP

      - name: Merakit & Menyalakan Mesin Telegraf VIP (Anti-Crash)
        run: |
          mkdir C:\TelegramBot
          cd C:\TelegramBot
          npm init -y
          
          # Install Telegraf (Engine Bot Telegram Paling Kuat & Modern)
          npm install telegraf
          
          # Menggunakan Single-Quote PowerShell agar format JavaScript 100% aman tak tersentuh
          $botCode = @'
          const { Telegraf, Markup } = require('telegraf');
          const { spawn } = require('child_process');
          const os = require('os');
          const fs = require('fs');
          
          const bot = new Telegraf('PLACEHOLDER_TOKEN');
          const myChatId = 'PLACEHOLDER_CHATID';
          const streamKey = '0ahd-k6zv-xuez-ww2r-4mjf';
          const tsIP = fs.readFileSync('C:\\ts_ip.txt', 'utf8').trim();
          
          let ffmpegProcess = null;
          let botState = 'idle';
          
          // Sistem Keamanan: Tolak pesan kalau bukan dari Chat ID lu
          bot.use((ctx, next) => {
              if (ctx.from && ctx.from.id.toString() === myChatId) {
                  return next();
              }
          });
          
          const menuUtama = Markup.inlineKeyboard([
              [Markup.button.callback('▶️ Mulai Streaming', 'menu_start')],
              [Markup.button.callback('🛑 Stop Streaming', 'stop_stream')],
              [Markup.button.callback('📊 Cek Status Server', 'cek_status')]
          ]);
          
          const menuSumber = Markup.inlineKeyboard([
              [Markup.button.callback('📁 Dari File RDP (Lokal)', 'src_local')],
              [Markup.button.callback('🌐 Dari Link (Drive/Web)', 'src_link')],
              [Markup.button.callback('🔙 Batal / Kembali', 'cancel')]
          ]);
          
          // Kirim pesan otomatis pas RDP nyala
          bot.telegram.sendMessage(myChatId, 
              '🚀 *VPS YANZZ BERHASIL ONLINE!*\n\n🌐 *IP Tailscale:* ' + tsIP + '\n👤 *User:* runneradmin\n🔑 *Pass:* Evan123456\n\n🤖 *Sistem Kontrol VIP Aktif!*\nPilih menu di bawah:', 
              { parse_mode: 'Markdown', ...menuUtama }
          ).catch(console.error);
          
          bot.action('menu_start', (ctx) => {
              botState = 'idle';
              ctx.editMessageText('Pilih sumber bahan video lu, Bos:', menuSumber).catch(()=>{});
              ctx.answerCbQuery();
          });
          
          bot.action('src_local', (ctx) => {
              botState = 'wait_local';
              ctx.editMessageText('📁 *Kirim lokasi file di RDP*\n(Contoh ngetiknya: C:\\\\video.mp4)', { parse_mode: 'Markdown' }).catch(()=>{});
              ctx.answerCbQuery();
          });
          
          bot.action('src_link', (ctx) => {
              botState = 'wait_link';
              ctx.editMessageText('🌐 *Kirim Direct Link atau Link Google Drive lu:*', { parse_mode: 'Markdown' }).catch(()=>{});
              ctx.answerCbQuery();
          });
          
          bot.action('cancel', (ctx) => {
              botState = 'idle';
              ctx.editMessageText('🤖 *Kembali ke Menu Utama.*', { parse_mode: 'Markdown', ...menuUtama }).catch(()=>{});
              ctx.answerCbQuery();
          });
          
          bot.action('stop_stream', (ctx) => {
              if (ffmpegProcess) {
                  ffmpegProcess.kill();
                  ffmpegProcess = null;
                  ctx.editMessageText('🛑 *Streaming dimatikan secara paksa.*', { parse_mode: 'Markdown', ...menuUtama }).catch(()=>{});
              } else {
                  ctx.editMessageText('⚠️ Tidak ada streaming yang sedang berjalan saat ini.', { parse_mode: 'Markdown', ...menuUtama }).catch(()=>{});
              }
              ctx.answerCbQuery();
          });
          
          bot.action('cek_status', (ctx) => {
              const freeRam = (os.freemem() / 1024 / 1024 / 1024).toFixed(2);
              const totalRam = (os.totalmem() / 1024 / 1024 / 1024).toFixed(2);
              const uptimeHours = (os.uptime() / 3600).toFixed(1);
              const streamStatus = ffmpegProcess ? '🟢 SEDANG LIVE' : '🔴 MATI (IDLE)';
              const statusMsg = '📊 *STATUS SERVER SAAT INI*\n\n🎥 *Status:* ' + streamStatus + '\n⏱️ *Uptime:* ' + uptimeHours + ' Jam\n🧠 *RAM:* ' + freeRam + ' / ' + totalRam + ' GB\n⚙️ *CPU:* ' + os.cpus().length + ' Core';
              
              ctx.editMessageText(statusMsg, { parse_mode: 'Markdown', ...menuUtama }).catch(()=>{});
              ctx.answerCbQuery();
          });
          
          bot.on('text', (ctx) => {
              if (botState === 'wait_local' || botState === 'wait_link') {
                  const videoPath = ctx.message.text;
                  botState = 'idle';
                  ctx.reply('⏳ Memproses video & menyambungkan ke YouTube...').catch(()=>{});
                  
                  if (ffmpegProcess) ffmpegProcess.kill();
                  
                  ffmpegProcess = spawn('ffmpeg', [
                      '-stream_loop', '-1',
                      '-re',
                      '-i', videoPath,
                      '-c:v', 'copy',
                      '-c:a', 'aac',
                      '-f', 'flv',
                      'rtmp://a.rtmp.youtube.com/live2/' + streamKey
                  ]);
                  
                  ctx.reply('✅ *Streaming Berhasil Berjalan!* 🚀\nVideo lu sekarang tayang nonstop.', { parse_mode: 'Markdown', ...menuUtama }).catch(()=>{});
                  
                  ffmpegProcess.on('close', (code) => {
                      ctx.reply('🛑 *Koneksi Terputus atau Streaming Berhenti Otomatis.*', { parse_mode: 'Markdown', ...menuUtama }).catch(()=>{});
                      ffmpegProcess = null;
                  });
              } else if (!ctx.message.text.startsWith('/')) {
                  ctx.reply('Silakan gunakan tombol menu di bawah ini ya, Bos:', { parse_mode: 'Markdown', ...menuUtama }).catch(()=>{});
              }
          });
          
          bot.launch();
          
          // Anti-Crash Handlers
          process.once('SIGINT', () => bot.stop('SIGINT'));
          process.once('SIGTERM', () => bot.stop('SIGTERM'));
          '@
          
          # Inject Data Rahasia dengan aman (Replace)
          $botCode = $botCode -replace "PLACEHOLDER_TOKEN", "${{ secrets.TELEGRAM_TOKEN }}"
          $botCode = $botCode -replace "PLACEHOLDER_CHATID", "${{ secrets.TELEGRAM_CHAT_ID }}"
          
          Set-Content -Path "C:\TelegramBot\bot.js" -Value $botCode -Encoding UTF8
          
          # Start PM2 dengan lock path yg bener biar node_modules langsung kedetect
          pm2 start C:\TelegramBot\bot.js --name "TelegramRemoteVIP" --cwd "C:\TelegramBot"
          
          # Menunggu bentar dan nampilin Log PM2 buat bukti botnya beneran jalan sehat
          Start-Sleep -Seconds 5
          pm2 logs TelegramRemoteVIP --lines 15 --nostream

      - name: Menahan Server Tetap Hidup
        run: |
          Write-Host "Mesin Telegraf VIP berhasil online. Hentikan workflow di GitHub untuk mematikan."
          ping -t 127.0.0.1 > $null
