name: Yanzz Ubuntu Headless System

on:
  workflow_dispatch:

jobs:
  ubuntu-headless:
    runs-on: ubuntu-latest
    timeout-minutes: 3600

    steps:
      - name: Bersihkan Lingkungan (Anti-Crash aaPanel)
        run: |
          echo "Menghapus web server bawaan GitHub yang bikin bentrok..."
          sudo systemctl stop apache2 nginx mysql || true
          sudo apt-get purge -y apache2 nginx apache2-utils apache2-bin || true
          sudo apt-get autoremove -y || true

      - name: Install Core Packages
        run: |
          sudo apt-get update
          sudo DEBIAN_FRONTEND=noninteractive apt-get install -y python3 git p7zip-full rclone ffmpeg wget curl unzip speedtest-cli openssh-server
          
          # Konfigurasi SSH
          sudo systemctl enable ssh
          sudo systemctl start ssh
          echo "runner:Evan123456" | sudo chpasswd

      - name: Setup Node.js & PM2 (Bot Environment)
        run: |
          curl -fsSL https://deb.nodesource.com/setup_lts.x | sudo -E bash -
          sudo apt-get install -y nodejs
          sudo npm install -g pm2

          mkdir -p ~/Pawno
          wget -q https://github.com/pawn-lang/compiler/releases/download/v3.10.10/pawnc-3.10.10-windows.zip -O /tmp/pawno.zip
          unzip -q /tmp/pawno.zip -d ~/Pawno
          rm /tmp/pawno.zip

      - name: Inisialisasi Environment Bot
        run: |
          mkdir -p ~/WABot
          cd ~/WABot

          npm init -y
          npm install @whiskeysockets/baileys pino readline @google/generative-ai youtube-dl-exec

          cat << 'EOF' > instruksi.txt
          Anda adalah Nave, asisten sistem virtual milik Bos Evan. Berikan jawaban yang efisien, profesional, dan langsung pada inti permasalahan tanpa gaya bahasa berlebihan.
          EOF

          touch index.js
          echo "// Nanti edit file ini langsung dari Code Editor di aaPanel" > index.js

      - name: Instalasi aaPanel (Professional Control Panel)
        run: |
          echo "Memulai instalasi aaPanel... (Tunggu 2-4 Menit)"
          wget -O install.sh http://www.aapanel.com/script/install-ubuntu_6.0_en.sh
          # Mengirim konfirmasi 'yes' untuk maksa install, lalu 'y', lalu 'n'
          echo -e "yes\ny\nn\ny\n" | sudo bash install.sh aapanel

      - name: Konfigurasi Akses Tailscale
        run: |
          curl -fsSL https://tailscale.com/install.sh | sh
          
          sudo tailscale up --authkey=${{ secrets.TAILSCALE_AUTH_KEY }} --hostname=gh-runner-${GITHUB_RUN_ID} --ssh
          
          tsIP=""
          retries=0
          while [ -z "$tsIP" ] && [ $retries -lt 10 ]; do
              tsIP=$(tailscale ip -4)
              sleep 5
              retries=$((retries+1))
          done
          
          echo "TAILSCALE_IP=$tsIP" >> $GITHUB_ENV
          
          echo -e "\n=========================================="
          echo "         INFORMASI AKSES SISTEM           "
          echo "=========================================="
          echo "SSH Host   : $tsIP"
          echo "SSH User   : runner (Pass: Evan123456)"
          echo "------------------------------------------"
          echo "DATA LOGIN aaPanel LU ADA DI BAWAH INI:"
          sudo /etc/init.d/bt default || echo "Login belum siap, cek manual via SSH: sudo bt default"
          echo "=========================================="

      - name: Menjalankan Sistem Utama
        run: |
          cd ~/WABot
          
          # Menjalankan Bot
          pm2 start index.js --name "NaveBot"
          
          while true; do
              echo "[$(date)] Sistem Berjalan - Hentikan workflow untuk mematikan server"
              sleep 300
          done
