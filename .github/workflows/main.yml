name: Yanzz Windows VPS System (Ultimate V7 Masterpiece)

on:
  workflow_dispatch:

jobs:
  windows-vps:
    runs-on: windows-latest
    timeout-minutes: 3600

    steps:
      - name: Set Timezone ke Indonesia (WIB)
        run: Set-TimeZone -Id "SE Asia Standard Time"

      - name: Konfigurasi Password Akun RDP
        run: net user runneradmin Evan123456

      - name: Install Node.js & PM2 (Bot Environment)
        uses: actions/setup-node@v3
        with:
          node-version: '20'
      - name: Install PM2 Global
        run: npm install -g pm2

      - name: Install Software (FFmpeg, yt-dlp, GraphicsMagick & VB-Cable)
        run: |
          choco install ffmpeg -y
          choco install yt-dlp -y
          choco install vb-cable -y

      - name: Optimasi Windows (Mode Super Ringan)
        run: |
          reg add "HKEY_CURRENT_USER\Control Panel\Colors" /v Background /t REG_SZ /d "0 0 0" /f >nul
          reg add "HKEY_CURRENT_USER\Control Panel\Desktop" /v Wallpaper /t REG_SZ /d "" /f >nul
          reg add "HKCU\Software\Microsoft\Windows\CurrentVersion\Explorer\VisualEffects" /v VisualFXSetting /t REG_DWORD /d 2 /f >nul
          powercfg -setactive 8c5e7fda-e8bf-4a96-9a85-a6e23a8c635c >nul

      - name: Setup Jaringan Tailscale
        run: |
          Invoke-WebRequest -Uri "https://pkgs.tailscale.com/stable/tailscale-setup-latest.exe" -OutFile "tailscale-setup.exe"
          Start-Process -FilePath ".\tailscale-setup.exe" -ArgumentList "/quiet" -Wait
          & "C:\Program Files\Tailscale\tailscale.exe" up --authkey=${{ secrets.TAILSCALE_AUTH_KEY }} --hostname=gh-windows-${env:GITHUB_RUN_ID}
          
          $TS_IP = & "C:\Program Files\Tailscale\tailscale.exe" ip -4
          Set-Content -Path "C:\ts_ip.txt" -Value $TS_IP

      - name: Merakit & Menyalakan Mesin Telegraf V7 (35+ Fitur)
        run: |
          mkdir C:\TelegramBot
          cd C:\TelegramBot
          npm init -y
          npm install telegraf
          
          $botCode = @'
          const { Telegraf, Markup } = require('telegraf');
          const { spawn, execSync } = require('child_process');
          const os = require('os');
          const fs = require('fs');
          
          const bot = new Telegraf('PLACEHOLDER_TOKEN');
          const myChatId = 'PLACEHOLDER_CHATID';
          
          let streamKey = '0ahd-k6zv-xuez-ww2r-4mjf';
          const ytHandle = 'Yanzz'; 
          const ytLiveLink = `https://youtube.com/@${ytHandle}/live`;
          const tsIP = fs.readFileSync('C:\\ts_ip.txt', 'utf8').trim();
          
          let ffmpegProcess = null;
          let botState = 'idle';
          let currentSource = 'Tidak ada';
          
          // Middleware Keamanan VIP
          bot.use((ctx, next) => {
              if (ctx.from && ctx.from.id.toString() === myChatId) return next();
          });
          
          // Menu Utama (Desain 3 Kolom Rapi)
          const sendMainMenu = (ctx, customText = '🤖 *PANEL KONTROL UTAMA (V7)*\nPilih menu di bawah ini, Bos:') => {
              const menu = Markup.inlineKeyboard([
                  [Markup.button.callback('🌐 Stream (Link)', 'src_link'), Markup.button.callback('📁 Stream (Lokal)', 'src_local')],
                  [Markup.button.callback('📊 Status VPS', 'cek_status'), Markup.button.callback('🛠️ Hardware', 'cek_hardware')],
                  [Markup.button.callback('📂 File Manager', 'file_manager'), Markup.button.callback('📸 SS Desktop', 'ss_rdp')],
                  [Markup.button.callback('🔑 Ganti Key', 'ganti_key'), Markup.button.callback('❓ Bantuan', 'help_menu')],
                  [Markup.button.callback('🛑 STOP STREAMING & CLEANUP', 'stop_stream')]
              ]);
              ctx.reply(customText, { parse_mode: 'Markdown', ...menu }).catch(()=>{});
          };
          
          bot.command('start', (ctx) => {
              botState = 'idle';
              sendMainMenu(ctx, `🚀 *VPS YANZZ BERHASIL ONLINE!*\n\n🌐 *IP RDP:* \`${tsIP}\`\n👤 *User:* \`runneradmin\`\n🔑 *Pass:* \`Evan123456\`\n\n_Semua 35+ Fitur siap digunakan!_`);
          });
          
          bot.command('help', (ctx) => {
              ctx.reply(`📖 *PANDUAN BOT V7*\n\n1. Gunakan tombol interaktif untuk navigasi.\n2. Untuk stream via link, pastikan link publik (Drive/Web).\n3. Bot dilengkapi auto-cleanup anti-sampah.\n4. Ketik perintah bebas untuk mode *CMD Executor* jarak jauh.`, { parse_mode: 'Markdown' });
          });
          
          bot.telegram.sendMessage(myChatId, `🚀 *VPS YANZZ ONLINE! (V7 - 35+ Fitur)*\n\n🌐 *IP:* \`${tsIP}\`\n🤖 *Ketik /start untuk membuka panel utama*`, {parse_mode: 'Markdown'});
          
          // --- CALLBACK HANDLERS ---
          bot.action('src_link', (ctx) => {
              botState = 'wait_link';
              ctx.reply('🌐 *Kirim Direct Link atau Link Google Drive lu:*\n_Bot otomatis nge-download & mainin._', { parse_mode: 'Markdown' }).catch(()=>{});
              ctx.answerCbQuery();
          });
          
          bot.action('src_local', (ctx) => {
              botState = 'wait_local';
              ctx.reply('📁 *Kirim lokasi file di RDP*\n(Contoh: `C:\\live.mp4`)', { parse_mode: 'Markdown' }).catch(()=>{});
              ctx.answerCbQuery();
          });
          
          bot.action('ganti_key', (ctx) => {
              botState = 'wait_key';
              ctx.reply(`🔑 *Stream Key saat ini:*\n\`${streamKey}\`\n\nKirim Stream Key baru lu:`, { parse_mode: 'Markdown' }).catch(()=>{});
              ctx.answerCbQuery();
          });
          
          bot.action('cek_status', (ctx) => {
              const freeRam = (os.freemem() / 1024 / 1024 / 1024).toFixed(2);
              const totalRam = (os.totalmem() / 1024 / 1024 / 1024).toFixed(2);
              const uptimeHours = (os.uptime() / 3600).toFixed(1);
              const streamStatus = ffmpegProcess ? '🟢 SEDANG LIVE' : '🔴 MATI (IDLE)';
              
              const msg = `📊 *STATUS SERVER V7*\n\n🎥 *Stream:* ${streamStatus}\n📂 *Sumber:* ${currentSource}\n⏱️ *Uptime:* ${uptimeHours} Jam\n🧠 *RAM:* ${freeRam} GB / ${totalRam} GB\n⚙️ *CPU Cores:* ${os.cpus().length} Core\n🌐 *IP Tailscale:* \`${tsIP}\``;
              ctx.reply(msg, { parse_mode: 'Markdown' }).catch(()=>{});
              ctx.answerCbQuery();
          });
          
          bot.action('cek_hardware', (ctx) => {
              let diskInfo = 'Tidak diketahui';
              try {
                  diskInfo = execSync('wmic logicaldisk get size,freespace,caption').toString();
              } catch(e){}
              
              ctx.reply(`🛠️ *DIAGNOSTIK HARDWARE*\n\n\`\`\`text\n${diskInfo}\`\`\``, { parse_mode: 'Markdown' }).catch(()=>{});
              ctx.answerCbQuery();
          });
          
          bot.action('file_manager', (ctx) => {
              let files = 'Kosong';
              try {
                  files = fs.readdirSync('C:\\TelegramBot').join('\n');
              } catch(e){}
              
              ctx.reply(`📂 *FILE DI DIREKTORI BOT*\n\n\`\`\`text\n${files}\`\`\``, { parse_mode: 'Markdown' }).catch(()=>{});
              ctx.answerCbQuery();
          });
          
          bot.action('ss_rdp', (ctx) => {
              ctx.reply('📸 Mengambil screenshot RDP...', { parse_mode: 'Markdown' }).catch(()=>{});
              try {
                  const ssPath = 'C:\\TelegramBot\\screen.png';
                  execSync(`powershell -command "Add-Type -AssemblyName System.Windows.Forms; [System.Windows.Forms.SendKeys]::SendWait('{PRTSC}'); Start-Sleep -Milliseconds 500; $img = [System.Windows.Forms.Clipboard]::GetImage(); if($img){ $img.Save('${ssPath}', [System.Drawing.Imaging.ImageFormat]::Png) }"`);
                  if(fs.existsSync(ssPath)){
                      ctx.replyWithPhoto({ source: ssPath }, { caption: '📸 *Screenshot Desktop RDP*', parse_mode: 'Markdown' });
                  } else {
                      ctx.reply('⚠️ Gagal mengambil screenshot.');
                  }
              } catch(err) {
                  ctx.reply(`⚠️ Error SS: ${err.message}`);
              }
              ctx.answerCbQuery();
          });
          
          bot.action('help_menu', (ctx) => {
              ctx.reply('❓ *BANTUAN & INFO V7*\nGunakan tombol navigasi untuk mengontrol bot secara penuh tanpa menyentuh RDP.', { parse_mode: 'Markdown' }).catch(()=>{});
              ctx.answerCbQuery();
          });
          
          bot.action('stop_stream', (ctx) => {
              botState = 'idle';
              currentSource = 'Tidak ada';
              
              if (ffmpegProcess) {
                  ffmpegProcess.kill('SIGKILL');
                  ffmpegProcess = null;
                  ctx.reply('🛑 *LOG: Menghentikan siaran secara paksa...*', { parse_mode: 'Markdown' }).catch(()=>{});
              } else {
                  ctx.reply('⚠️ *LOG: Nggak ada streaming yang jalan.*', { parse_mode: 'Markdown' }).catch(()=>{});
              }
              
              setTimeout(() => {
                  let cleanupMsg = '';
                  const outPath = 'C:\\TelegramBot\\video_sedotan.mp4';
                  try {
                      if(fs.existsSync(outPath)) {
                          fs.unlinkSync(outPath);
                          cleanupMsg = '🧹 *Storage dibersihkan secara aman.*';
                      }
                  } catch (err) {
                      cleanupMsg = '⚠️ *Pembersihan di-skip (File terkunci).*';
                  }
                  
                  if (cleanupMsg) ctx.reply(cleanupMsg, { parse_mode: 'Markdown' }).catch(()=>{});
                  sendMainMenu(ctx);
              }, 1500);
              
              ctx.answerCbQuery();
          });
          
          // --- ENGINE STREAMING ---
          function startFFmpeg(ctx, videoPath, msgId, sourceName) {
              if (ffmpegProcess) ffmpegProcess.kill('SIGKILL');
              currentSource = sourceName;
              
              ffmpegProcess = spawn('ffmpeg', [
                  '-stream_loop', '-1',
                  '-re',
                  '-i', videoPath,
                  '-c:v', 'copy',
                  '-c:a', 'aac',
                  '-f', 'flv',
                  `rtmp://a.rtmp.youtube.com/live2/${streamKey}`
              ]);
              
              ffmpegProcess.on('spawn', () => {
                  const successText = `✅ *LOG: SUCCESS!*\nMesin Streaming mengudara! 🚀\n\n📺 *Cek Siaran Lu Disini:*\n${ytLiveLink}`;
                  ctx.telegram.editMessageText(myChatId, msgId, null, successText, { parse_mode: 'Markdown' }).catch(()=>{});
              });
              
              let errLog = '';
              ffmpegProcess.stderr.on('data', (data) => {
                  errLog += data.toString();
                  if(errLog.length > 1500) errLog = errLog.substring(errLog.length - 800);
              });
              
              ffmpegProcess.on('close', (code) => {
                  if (ffmpegProcess) {
                      ffmpegProcess = null;
                      currentSource = 'Tidak ada';
                      let shortLog = errLog.substring(errLog.length - 300);
                      ctx.reply(`🛑 *LOG: STREAMING TERPUTUS! (Code: ${code})*\n\n*Log:*\n\`\`\`text\n${shortLog}\n\`\`\``, { parse_mode: 'Markdown' }).catch(()=>{});
                      sendMainMenu(ctx);
                  }
              });
          }
          
          // --- HANDLER CHAT & CMD EXECUTOR ---
          bot.on('text', async (ctx) => {
              const txt = ctx.message.text;
              if (txt.startsWith('/')) return;
              
              if (botState === 'wait_key') {
                  streamKey = txt.trim();
                  botState = 'idle';
                  ctx.reply(`✅ *Stream Key berhasil diubah ke:*\n\`${streamKey}\``, { parse_mode: 'Markdown' }).catch(()=>{});
                  sendMainMenu(ctx);
                  
              } else if (botState === 'wait_link') {
                  botState = 'idle';
                  const processMsg = await ctx.reply('⏳ *LOG: Memulai Download Video dari Link...*', { parse_mode: 'Markdown' });
                  
                  const outPath = 'C:\\TelegramBot\\video_sedotan.mp4';
                  try { if(fs.existsSync(outPath)) fs.unlinkSync(outPath); } catch(e){}
                  
                  const dlProcess = spawn('yt-dlp', ['-f', 'b[ext=mp4]/b', '-o', outPath, txt]);
                  let dlLogs = '';
                  
                  dlProcess.stdout.on('data', d => dlLogs += d.toString());
                  dlProcess.stderr.on('data', d => dlLogs += d.toString());
                  
                  dlProcess.on('close', (code) => {
                      if (code === 0 && fs.existsSync(outPath)) {
                          ctx.telegram.editMessageText(myChatId, processMsg.message_id, null, '✅ *LOG: Download Selesai!*\n\n🚀 *Menghidupkan mesin streaming...*', { parse_mode: 'Markdown' }).catch(()=>{});
                          startFFmpeg(ctx, outPath, processMsg.message_id, 'Link Web/Drive');
                      } else {
                          let shortErr = dlLogs.substring(dlLogs.length - 300);
                          ctx.telegram.editMessageText(myChatId, processMsg.message_id, null, `❌ *LOG: GAGAL DOWNLOAD VIDEO!*\n\n*Log:*\n\`\`\`text\n${shortErr}\n\`\`\``, { parse_mode: 'Markdown' }).catch(()=>{});
                          sendMainMenu(ctx);
                      }
                  });
                  
              } else if (botState === 'wait_local') {
                  botState = 'idle';
                  if (fs.existsSync(txt)) {
                      const processMsg = await ctx.reply('⏳ *LOG: File Ditemukan. Menyiapkan Engine...*', { parse_mode: 'Markdown' });
                      startFFmpeg(ctx, txt, processMsg.message_id, 'File Lokal RDP');
                  } else {
                      ctx.reply('❌ *LOG: File Tidak Ditemukan di RDP!*', { parse_mode: 'Markdown' }).catch(()=>{});
                      sendMainMenu(ctx);
                  }
              } else {
                  // --- FITUR RAHASIA 35+: CMD EXECUTOR JARAK JAUH ---
                  try {
                      ctx.reply(`⚙️ Mengeksekusi perintah CMD: \`${txt}\``, { parse_mode: 'Markdown' });
                      const result = execSync(txt, { timeout: 10000 }).toString();
                      let out = result.length > 3000 ? result.substring(0, 3000) + '... (Dipotong)' : result;
                      ctx.reply(`💻 *Output CMD:*\n\`\`\`text\n${out}\n\`\`\``, { parse_mode: 'Markdown' });
                  } catch (err) {
                      ctx.reply(`❌ *CMD Error:* \`${err.message}\``, { parse_mode: 'Markdown' });
                  }
              }
          });
          
          bot.launch();
          process.once('SIGINT', () => bot.stop('SIGINT'));
          process.once('SIGTERM', () => bot.stop('SIGTERM'));
          '@
          
          $botCode = $botCode -replace "PLACEHOLDER_TOKEN", "${{ secrets.TELEGRAM_TOKEN }}"
          $botCode = $botCode -replace "PLACEHOLDER_CHATID", "${{ secrets.TELEGRAM_CHAT_ID }}"
          
          Set-Content -Path "C:\TelegramBot\bot.js" -Value $botCode -Encoding UTF8
          
          pm2 start C:\TelegramBot\bot.js --name "TelegramRemoteVIP" --cwd "C:\TelegramBot"
          Start-Sleep -Seconds 5
          pm2 logs TelegramRemoteVIP --lines 15 --nostream

      - name: Menahan Server Tetap Hidup
        run: |
          Write-Host "Mesin Telegraf V7 berhasil online."
          ping -t 127.0.0.1 > $null
