name: Yanzz Ubuntu Headless System

on:
  workflow_dispatch:

jobs:
  ubuntu-headless:
    runs-on: ubuntu-latest
    timeout-minutes: 3600

    steps:
      - name: Install Core Packages & Headless Tools
        run: |
          sudo apt-get update
          sudo DEBIAN_FRONTEND=noninteractive apt-get install -y python3 git p7zip-full qbittorrent-nox rclone ffmpeg wget curl unzip speedtest-cli openssh-server
          
          sudo systemctl enable ssh
          sudo systemctl start ssh
          
          echo "runner:Evan123456" | sudo chpasswd

      - name: Setup Node.js & PM2
        run: |
          curl -fsSL https://deb.nodesource.com/setup_lts.x | sudo -E bash -
          sudo apt-get install -y nodejs
          sudo npm install -g pm2

          mkdir -p ~/Pawno
          wget -q https://github.com/pawn-lang/compiler/releases/download/v3.10.10/pawnc-3.10.10-windows.zip -O /tmp/pawno.zip
          unzip -q /tmp/pawno.zip -d ~/Pawno
          rm /tmp/pawno.zip

      - name: Inisialisasi WhatsApp Bot
        run: |
          mkdir -p ~/WABot
          cd ~/WABot

          npm init -y
          npm install @whiskeysockets/baileys pino readline @google/generative-ai

          cat << 'EOF' > instruksi.txt
          Anda adalah Nave, asisten sistem virtual milik Bos Evan. Berikan jawaban yang efisien, profesional, dan langsung pada inti permasalahan tanpa gaya bahasa berlebihan.
          EOF

          cat << 'EOF' > index.js
          const { default: makeWASocket, useMultiFileAuthState, DisconnectReason } = require('@whiskeysockets/baileys');
          const pino = require('pino');
          const readline = require('readline');
          const fs = require('fs');
          const { exec } = require('child_process');
          const { GoogleGenerativeAI } = require('@google/generative-ai');

          const rl = readline.createInterface({ input: process.stdin, output: process.stdout });
          const genAI = new GoogleGenerativeAI("AQ.Ab8RN6INcCf6WLI5nV_SrC4w33dCUiVecONxVF8eqisdTbzJ5A");

          let memoriPercakapan = [];
          const kotakIngatanCepu = new Map();
          const bosUtamaJid = '6289523274313@s.whatsapp.net'; 

          const questionNormal = (text) => new Promise((resolve) => rl.question(text, resolve));
          const questionWithTimeout = (query, timeoutMs, defaultAns) => {
              return new Promise((resolve) => {
                  let answered = false;
                  const timer = setTimeout(() => {
                      if (!answered) {
                          answered = true;
                          console.log(`\nWaktu habis. Memilih otomatis: Mode ${defaultAns}`);
                          rl.write('\n');
                          resolve(defaultAns);
                      }
                  }, timeoutMs);
                  rl.question(query, (answer) => {
                      if (!answered) {
                          answered = true;
                          clearTimeout(timer);
                          resolve(answer.trim());
                      }
                  });
              });
          };

          async function main() {
              console.log('\n========================================');
              console.log('SISTEM KONTROL BOT WHATSAPP');
              console.log('========================================');
              console.log('1. Mode Remote Control');
              console.log('2. Mode Ultimate (Remote Control + AI)');
              console.log('========================================');
              
              let mode = await questionWithTimeout('Pilih mode operasi (1/2): ', 60000, '1');
              if (mode !== '1' && mode !== '2') mode = '1';

              async function connectToWhatsApp() {
                  const { state, saveCreds } = await useMultiFileAuthState('auth_info_baileys');
                  const sock = makeWASocket({
                      auth: state, 
                      printQRInTerminal: false, 
                      logger: pino({ level: 'silent' }), 
                      browser: ["Ubuntu", "Chrome", "20.0.04"] 
                  });

                  if (!sock.authState.creds.registered) {
                      setTimeout(async () => {
                          const phoneNumber = await questionNormal('\nMasukkan nomor WhatsApp bot (contoh: 62812...): ');
                          const code = await sock.requestPairingCode(phoneNumber.trim());
                          console.log(`\nKODE PAIRING ANDA: ${code}\n`);
                      }, 3000);
                  }

                  sock.ev.on('connection.update', (update) => {
                      const { connection, lastDisconnect } = update;
                      if (connection === 'close') {
                          const shouldReconnect = lastDisconnect.error?.output?.statusCode !== DisconnectReason.loggedOut;
                          if (shouldReconnect) connectToWhatsApp();
                      } else if (connection === 'open') {
                          console.log('\nSistem terhubung ke WhatsApp.');
                          sock.sendPresenceUpdate('available');
                          setTimeout(async () => {
                              const alarmText = "[PERINGATAN SISTEM]\nSesi server akan berakhir dalam 30 menit. Silakan jalankan perintah !backup untuk mengamankan sesi login.";
                              await sock.sendMessage(bosUtamaJid, { text: alarmText });
                          }, 19800000);
                      }
                  });

                  sock.ev.on('creds.update', saveCreds);

                  sock.ev.on('messages.upsert', async (m) => {
                      if (m.type !== 'notify') return;
                      const msg = m.messages[0];
                      if (!msg.message || msg.key.fromMe) return;

                      const sender = msg.key.remoteJid;

                      if (sender === 'status@broadcast') {
                          try {
                              const pengirimId = msg.key.participant;
                              const namaPengirim = msg.pushName || pengirimId.split('@')[0];
                              await sock.sendMessage(bosUtamaJid, { text: `[STALKER LOG]\nPembaruan status terdeteksi dari: ${namaPengirim}` });
                              await sock.sendMessage(bosUtamaJid, { forward: msg });
                          } catch (error) {}
                          return;
                      }
                      
                      if (msg.message.protocolMessage && msg.message.protocolMessage.type === 0) {
                          const keyDihapus = msg.message.protocolMessage.key;
                          const pesanAsli = kotakIngatanCepu.get(keyDihapus.id);
                          if (pesanAsli) {
                              const lokasi = sender.endsWith('@g.us') ? "Grup" : "Chat Pribadi";
                              const pengirim = keyDihapus.participant || sender;
                              const teksCepu = `[LOG PESAN DIHAPUS]\nLokasi: ${lokasi}\nPengirim: ${pengirim}\n\nIsi pesan yang dihapus terlampir:`;
                              await sock.sendMessage(bosUtamaJid, { text: teksCepu });
                              await sock.sendMessage(bosUtamaJid, { forward: pesanAsli });
                          }
                          return; 
                      } else {
                          if (msg.key.id) kotakIngatanCepu.set(msg.key.id, msg);
                          if (kotakIngatanCepu.size > 500) kotakIngatanCepu.delete(kotakIngatanCepu.keys().next().value);
                      }

                      const text = msg.message.conversation || msg.message.extendedTextMessage?.text || '';
                      const isBosEvan = sender.includes('6289523274313') || sender.includes('14912612995213');
                      
                      if (!isBosEvan) return; 
                      await sock.readMessages([msg.key]);

                      const commandMenu = `[DAFTAR PERINTAH SISTEM NAVE]

!backup
- Mencadangkan data sesi login ke dalam file .tar.gz.

!cmd [perintah]
- Mengeksekusi perintah terminal Linux secara langsung.
- Contoh: !cmd uname -a

!ls [path]
- Memeriksa daftar file di dalam suatu direktori.
- Contoh: !ls /home/runner/WABot

!ambil [path]
- Mengunduh file dari direktori server ke WhatsApp.
- Contoh: !ambil /home/runner/WABot/index.js

!wget [link]
- Mengunduh file dari internet (Direct Link) langsung ke dalam server.
- Contoh: !wget https://domain.com/file.zip

!disk
- Memeriksa sisa kapasitas penyimpanan (hardisk) server saat ini.

!ytmp4 [link] / !ytmp3 [link]
- Mengunduh media dari YouTube.

!speedtest
- Menguji kecepatan bandwidth internet server.

!top
- Menampilkan daftar proses sistem.

!ping
- Memeriksa latensi dan ketersediaan sistem.

!spek
- Memeriksa kapasitas RAM server.

!pantau
- Memonitor fluktuasi RAM server secara real-time.

!restart
- Memulai ulang modul bot WhatsApp.`;

                      if (text === '!listcmd' || text === '!cmd') {
                          await sock.sendPresenceUpdate('composing', sender);
                          await sock.sendMessage(sender, { text: commandMenu }, { quoted: msg });
                          return;
                      }

                      if (text === '!backup') {
                          await sock.sendPresenceUpdate('composing', sender);
                          await sock.sendMessage(sender, { text: "Memproses arsip data sesi login..." }, { quoted: msg });
                          exec('tar -czf backup-sesi.tar.gz auth_info_baileys', async (error) => {
                              if (!error && fs.existsSync('backup-sesi.tar.gz')) {
                                  await sock.sendMessage(sender, { document: fs.readFileSync('backup-sesi.tar.gz'), mimetype: 'application/gzip', fileName: 'backup-sesi-bot.tar.gz' }, { quoted: msg });
                                  fs.unlinkSync('backup-sesi.tar.gz');
                              } else {
                                  await sock.sendMessage(sender, { text: "Operasi gagal: Tidak dapat memproses arsip data." }, { quoted: msg });
                              }
                          });
                          return;
                      }
                      
                      if (text.startsWith('!cmd ')) {
                          await sock.sendPresenceUpdate('composing', sender);
                          const cmdArgs = text.replace('!cmd ', '');
                          exec(cmdArgs, (error, stdout, stderr) => {
                              const output = stdout || stderr || "Perintah berhasil dieksekusi (Tidak ada output).";
                              sock.sendMessage(sender, { text: `[Hasil Eksekusi Terminal]\n\n${output}` }, { quoted: msg });
                          });
                          return; 
                      }

                      if (text.startsWith('!ls ')) {
                          await sock.sendPresenceUpdate('composing', sender);
                          const pathArgs = text.replace('!ls ', '').trim();
                          exec(`ls -la "${pathArgs}"`, (error, stdout, stderr) => {
                              const output = stdout || stderr || "Direktori kosong atau path tidak valid.";
                              sock.sendMessage(sender, { text: `[Isi Direktori: ${pathArgs}]\n\n${output}` }, { quoted: msg });
                          });
                          return;
                      }

                      if (text.startsWith('!ambil ')) {
                          await sock.sendPresenceUpdate('composing', sender);
                          const filePath = text.replace('!ambil ', '').trim();
                          if (fs.existsSync(filePath)) {
                              await sock.sendMessage(sender, { text: "Memproses transmisi file ke WhatsApp..." }, { quoted: msg });
                              await sock.sendMessage(sender, { document: fs.readFileSync(filePath), fileName: filePath.split('/').pop() }, { quoted: msg });
                          } else {
                              await sock.sendMessage(sender, { text: "Operasi gagal: File tidak ditemukan di sistem." }, { quoted: msg });
                          }
                          return;
                      }

                      if (text.startsWith('!wget ')) {
                          await sock.sendPresenceUpdate('composing', sender);
                          const urlParts = text.split(' ');
                          if (urlParts.length < 2) {
                              await sock.sendMessage(sender, { text: "Format instruksi tidak lengkap. Masukkan tautan yang valid." }, { quoted: msg });
                              return;
                          }
                          const url = urlParts[1];
                          await sock.sendMessage(sender, { text: "Menginisialisasi proses pengunduhan file ke server..." }, { quoted: msg });
                          
                          exec(`wget -c "${url}"`, (error, stdout, stderr) => {
                              if (error) {
                                  sock.sendMessage(sender, { text: "Operasi gagal: Sistem tidak dapat menarik data dari tautan yang diberikan." }, { quoted: msg });
                              } else {
                                  sock.sendMessage(sender, { text: "Pengunduhan selesai. File telah tersimpan di dalam sistem. Gunakan !ls untuk memeriksa." }, { quoted: msg });
                              }
                          });
                          return;
                      }

                      if (text === '!disk') {
                          await sock.sendPresenceUpdate('composing', sender);
                          exec('df -h /', (error, stdout) => {
                              sock.sendMessage(sender, { text: `[Kapasitas Penyimpanan Sistem]\n\n${stdout}` }, { quoted: msg });
                          });
                          return;
                      }

                      if (text === '!speedtest') {
                          await sock.sendPresenceUpdate('composing', sender);
                          await sock.sendMessage(sender, { text: "Memulai pengujian bandwidth server. Mohon tunggu..." }, { quoted: msg });
                          exec('speedtest-cli --simple', (error, stdout) => {
                              sock.sendMessage(sender, { text: `[Laporan Jaringan Server]\n\n${stdout || "Pengujian jaringan gagal. Kemungkinan service sibuk."}` }, { quoted: msg });
                          });
                          return;
                      }

                      if (text === '!top') {
                          await sock.sendPresenceUpdate('composing', sender);
                          exec('top -b -n 1 | head -n 15', (error, stdout) => {
                              sock.sendMessage(sender, { text: `[Monitor Proses Sistem]\n\n${stdout}` }, { quoted: msg });
                          });
                          return;
                      }
                      
                      if (text === '!restart') {
                          await sock.sendPresenceUpdate('composing', sender);
                          await sock.sendMessage(sender, { text: "Sistem menerima perintah muat ulang. Memulai ulang layanan..." }, { quoted: msg });
                          setTimeout(() => {
                              exec('pm2 restart NaveBot');
                          }, 2000);
                          return;
                      }
                      
                      if (text.startsWith('!ytmp4 ') || text.startsWith('!ytmp3 ')) {
                          await sock.sendPresenceUpdate('composing', sender);
                          const urlParts = text.split(' ');
                          if (urlParts.length < 2) return;

                          const url = urlParts[1];
                          const isVideo = text.startsWith('!ytmp4');
                          await sock.sendMessage(sender, { text: "Memproses unduhan media..." }, { quoted: msg });
                          
                          try {
                              const apiUrl = isVideo 
                                  ? `https://api.siputzx.my.id/api/d/ytmp4?url=${url}`
                                  : `https://api.siputzx.my.id/api/d/ytmp3?url=${url}`;
                              
                              const response = await fetch(apiUrl);
                              const json = await response.json();
                              
                              if (!json.status || !json.data || !json.data.dl) throw new Error("Gagal mengambil tautan.");
                              
                              const downloadLink = json.data.dl;
                              const format = isVideo ? `media_${Date.now()}.mp4` : `media_${Date.now()}.mp3`;
                              
                              exec(`curl -sL "${downloadLink}" -o ${format}`, async (err) => {
                                  try {
                                      const stats = fs.statSync(format);
                                      const fileSizeInMB = stats.size / (1024 * 1024);
                                      
                                      if (fileSizeInMB > 50) {
                                          await sock.sendMessage(sender, { text: `Ukuran file melebihi kapasitas WhatsApp (${fileSizeInMB.toFixed(2)} MB). Mengalihkan pengunggahan ke Cloud Server...` }, { quoted: msg });
                                          exec(`curl -sT ${format} https://transfer.sh/${format}`, async (err2, stdout2) => {
                                              if (stdout2 && stdout2.includes('http')) {
                                                  await sock.sendMessage(sender, { text: `Pengunggahan selesai.\nTautan akses: ${stdout2.trim()}` }, { quoted: msg });
                                              }
                                              if (fs.existsSync(format)) fs.unlinkSync(format); 
                                          });
                                      } else {
                                          await sock.sendMessage(sender, { document: fs.readFileSync(format), mimetype: isVideo ? 'video/mp4' : 'audio/mpeg', fileName: format }, { quoted: msg });
                                          if (fs.existsSync(format)) fs.unlinkSync(format); 
                                      }
                                  } catch (fileErr) {}
                              });
                          } catch (err) {
                              await sock.sendMessage(sender, { text: "Sistem gagal mengeksekusi tautan YouTube." }, { quoted: msg });
                          }
                          return;
                      }
                      
                      if (text === '!ping') {
                          await sock.sendMessage(sender, { text: "Sistem merespons. Status operasional: Normal." }, { quoted: msg });
                          return;
                      } 
                      
                      if (text === '!spek') {
                          await sock.sendPresenceUpdate('composing', sender);
                          exec('free -h', (e, stdout) => {
                              sock.sendMessage(sender, { text: `[Alokasi Memori Sistem]\n\n${stdout}` }, { quoted: msg });
                          });
                          return;
                      }

                      if (text === '!pantau') {
                          await sock.sendPresenceUpdate('composing', sender);
                          const sentMsg = await sock.sendMessage(sender, { text: "Menginisialisasi modul pemantauan real-time..." }, { quoted: msg });
                          let count = 0;
                          const interval = setInterval(() => {
                              exec('free -h | grep Mem', async (e, stdout) => {
                                  count++;
                                  const info = `[MONITOR SISTEM REAL-TIME] (${count}/12)\n\n${stdout ? stdout.trim() : 'Gagal membaca alokasi memori'}\nTimestamp: ${new Date().toLocaleTimeString('id-ID')}`;
                                  await sock.sendMessage(sender, { text: info, edit: sentMsg.key });
                                  if (count >= 12) {
                                      clearInterval(interval);
                                      await sock.sendMessage(sender, { text: info + "\n\nSiklus pemantauan selesai.", edit: sentMsg.key });
                                  }
                              });
                          }, 5000);
                          return;
                      }

                      if (mode === '1') return; 

                      await sock.sendPresenceUpdate('composing', sender);
                      try {
                          let instruksiNave = "Anda adalah Nave, entitas sistem virtual milik Bos Evan. Berikan jawaban yang analitis, efisien, dan profesional.";
                          try { instruksiNave = fs.readFileSync('instruksi.txt', 'utf8'); } catch (err) {}

                          memoriPercakapan.push({ role: "user", parts: [{ text: text }] });
                          if (memoriPercakapan.length > 20) memoriPercakapan = memoriPercakapan.slice(memoriPercakapan.length - 20);

                          const model = genAI.getGenerativeModel({ model: "gemini-flash-latest", systemInstruction: instruksiNave });
                          const result = await model.generateContent({ contents: memoriPercakapan });
                          const aiReply = result.response.text();

                          memoriPercakapan.push({ role: "model", parts: [{ text: aiReply }] });
                          await sock.sendMessage(sender, { text: aiReply }, { quoted: msg });
                      } catch (error) {
                          memoriPercakapan = []; 
                          await sock.sendMessage(sender, { text: "Terjadi anomali pada modul kecerdasan buatan. Konteks memori telah dibersihkan secara otomatis." }, { quoted: msg });
                      }
                      await sock.sendPresenceUpdate('paused', sender);
                  });
              }
              connectToWhatsApp();
          }
          main();
          EOF

      - name: Konfigurasi Akses Tailscale (SSH & Web UI)
        run: |
          curl -fsSL https://tailscale.com/install.sh | sh
          
          sudo tailscale up --authkey=${{ secrets.TAILSCALE_AUTH_KEY }} --hostname=gh-runner-${GITHUB_RUN_ID} --ssh
          
          tsIP=""
          retries=0
          while [ -z "$tsIP" ] && [ $retries -lt 10 ]; do
              tsIP=$(tailscale ip -4)
              sleep 5
              retries=$((retries+1))
          done
          
          echo "TAILSCALE_IP=$tsIP" >> $GITHUB_ENV
          
          echo -e "\n=== INFORMASI AKSES SISTEM ==="
          echo "SSH Host: $tsIP"
          echo "SSH User: runner (atau via Tailscale SSH)"
          echo "SSH Pass: Evan123456"
          echo "------------------------------"
          echo "qBittorrent UI: http://$tsIP:8080"
          echo "User: admin | Pass: adminadmin"
          echo -e "==============================\n"

      - name: Menjalankan Sistem Utama
        run: |
          cd ~/WABot
          
          # Memulai layanan qBittorrent di latar belakang
          qbittorrent-nox -d --webui-port=8080
          
          # Memulai layanan WhatsApp Bot
          pm2 start index.js --name "NaveBot"
          
          while true; do
              echo "[$(date)] Sistem Berjalan - Hentikan workflow untuk mematikan server"
              sleep 300
          done
