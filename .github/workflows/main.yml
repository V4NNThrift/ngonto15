name: Yanzz Ubuntu Headless System

on:
  workflow_dispatch:

jobs:
  ubuntu-headless:
    runs-on: ubuntu-latest
    timeout-minutes: 3600

    steps:
      - name: Install Core Packages
        run: |
          sudo apt-get update
          sudo apt-get install -y python3 git p7zip-full rclone ffmpeg wget curl unzip speedtest-cli openssh-server
          
          sudo systemctl enable ssh
          sudo systemctl start ssh
          echo "runner:Evan123456" | sudo chpasswd

      - name: Setup Node.js & PM2
        run: |
          curl -fsSL https://deb.nodesource.com/setup_lts.x | sudo -E bash -
          sudo apt-get install -y nodejs
          sudo npm install -g pm2

      - name: Inisialisasi Environment Bot
        run: |
          mkdir -p ~/WABot
          cd ~/WABot
          npm init -y
          npm install @whiskeysockets/baileys pino readline @google/generative-ai youtube-dl-exec

      - name: Instalasi 1Panel (Panel Server Paling Modern)
        run: |
          echo "Menginstal 1Panel..."
          # Script 1Panel ini jauh lebih ramah dibanding aaPanel
          curl -sSL https://resource.fit2cloud.com/1panel/package/quick_start.sh?sign=8c2a8f3b | bash
          
          # 1Panel akan berjalan otomatis di port 27015 atau acak, nanti kita cek log

      - name: Konfigurasi Akses Tailscale
        run: |
          curl -fsSL https://tailscale.com/install.sh | sh
          sudo tailscale up --authkey=${{ secrets.TAILSCALE_AUTH_KEY }} --hostname=gh-runner-${GITHUB_RUN_ID} --ssh
          
          tsIP=""
          retries=0
          while [ -z "$tsIP" ] && [ $retries -lt 10 ]; do
              tsIP=$(tailscale ip -4)
              sleep 5
              retries=$((retries+1))
          done
          
          echo -e "\n=========================================="
          echo "         INFORMASI AKSES SISTEM           "
          echo "=========================================="
          echo "SSH Host   : $tsIP"
          echo "SSH User   : runner (Pass: Evan123456)"
          echo "------------------------------------------"
          echo "Info Login 1Panel:"
          sudo 1pctl user-info || echo "Jalankan 'sudo 1pctl user-info' via SSH nanti."
          echo "=========================================="

      - name: Menjalankan Bot
        run: |
          cd ~/WABot
          pm2 start index.js --name "NaveBot"
          while true; do sleep 300; done
