name: Yanzz Windows VPS System (Super Stream Edition)

on:
  workflow_dispatch:

jobs:
  windows-vps:
    runs-on: windows-latest
    timeout-minutes: 3600

    steps:
      - name: Set Timezone ke Indonesia (WIB)
        run: Set-TimeZone -Id "SE Asia Standard Time"

      - name: Konfigurasi Password Akun RDP
        run: net user runneradmin Evan123456

      - name: Install Node.js & PM2 (Bot Environment)
        uses: actions/setup-node@v3
        with:
          node-version: '20'
      - name: Install PM2 Global
        run: npm install -g pm2

      - name: Install Software (FFmpeg & VB-Cable Saja)
        run: |
          choco install ffmpeg -y
          choco install vb-cable -y

      - name: Optimasi Windows & Buat Shortcut Desktop
        run: |
          # 1. BIKIN SCRIPT MULAI STREAMING
          $streamBat = @"
          @echo off
          title Yanzz Auto-Stream FFmpeg
          color 0A
          echo ===================================================
          echo         AUTO STREAMING YOUTUBE VIA FFMPEG
          echo ===================================================
          echo.
          set /p video_path="Masukkan lokasi file video (contoh: C:\video.mp4) : "
          echo.
          echo [!] Memulai streaming... Jangan tutup jendela ini!
          echo [!] Tekan CTRL+C jika ingin mematikan live streaming.
          echo.
          ffmpeg -stream_loop -1 -re -i "%video_path%" -c:v copy -c:a aac -f flv "rtmp://a.rtmp.youtube.com/live2/4j6v-2k86-xpgw-a5y3-2qpk"
          pause
          "@
          New-Item -Path "C:\Users\Public\Desktop\Mulai_Streaming.bat" -ItemType File -Value $streamBat -Force

          # 2. BIKIN SCRIPT MODE PERFORMA SUPER
          $performaBat = @"
          @echo off
          title Mode Performa Super RDP
          color 0C
          echo ===================================================
          echo          MENERAPKAN MODE SUPER RINGAN...
          echo ===================================================
          echo.
          echo [1] Mengubah wallpaper menjadi hitam pekat...
          reg add "HKEY_CURRENT_USER\Control Panel\Colors" /v Background /t REG_SZ /d "0 0 0" /f >nul
          reg add "HKEY_CURRENT_USER\Control Panel\Desktop" /v Wallpaper /t REG_SZ /d "" /f >nul
          
          echo [2] Mematikan semua efek animasi Windows...
          reg add "HKCU\Software\Microsoft\Windows\CurrentVersion\Explorer\VisualEffects" /v VisualFXSetting /t REG_DWORD /d 2 /f >nul
          
          echo [3] Mengaktifkan Mode High Performance CPU...
          powercfg -setactive 8c5e7fda-e8bf-4a96-9a85-a6e23a8c635c >nul
          
          echo [4] Merestart antarmuka Windows...
          taskkill /f /im explorer.exe >nul
          start explorer.exe
          echo.
          echo SELESAI! RDP sekarang berada dalam performa maksimal.
          pause
          "@
          New-Item -Path "C:\Users\Public\Desktop\Mode_Performa_Super.bat" -ItemType File -Value $performaBat -Force

      - name: Install Windows Admin Center (Web Dashboard)
        run: |
          Invoke-WebRequest -Uri "https://aka.ms/WACDownload" -OutFile "WAC.msi"
          Start-Process msiexec.exe -Wait -ArgumentList "/i WAC.msi /qn /L*v wac_log.txt SME_PORT=6516 SSL_CERTIFICATE_OPTION=generate"
          New-NetFirewallRule -DisplayName "WAC Web" -Direction Inbound -LocalPort 6516 -Protocol TCP -Action Allow

      - name: Setup Jaringan Tailscale
        run: |
          Invoke-WebRequest -Uri "https://pkgs.tailscale.com/stable/tailscale-setup-latest.exe" -OutFile "tailscale-setup.exe"
          Start-Process -FilePath ".\tailscale-setup.exe" -ArgumentList "/quiet" -Wait
          
          & "C:\Program Files\Tailscale\tailscale.exe" up --authkey=${{ secrets.TAILSCALE_AUTH_KEY }} --hostname=gh-windows-${env:GITHUB_RUN_ID}
          $TS_IP = & "C:\Program Files\Tailscale\tailscale.exe" ip -4
          
          Write-Host ""
          Write-Host "=== INFORMASI AKSES VPS WINDOWS ==="
          Write-Host "IP RDP / Tailscale : $TS_IP"
          Write-Host "Username           : runneradmin"
          Write-Host "Password           : Evan123456"
          Write-Host "-----------------------------------"
          Write-Host "Windows Admin Center (Web Monitor) :"
          Write-Host "https://$($TS_IP):6516"
          Write-Host "==================================="
          Write-Host ""

      - name: Menahan Server Tetap Hidup
        run: |
          Write-Host "Server berhasil berjalan. Hentikan workflow di GitHub untuk mematikan."
          ping -t 127.0.0.1 > $null
