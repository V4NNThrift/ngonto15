name: Yanzz Ubuntu Headless System

on:
  workflow_dispatch:

jobs:
  ubuntu-headless:
    runs-on: ubuntu-latest
    timeout-minutes: 3600

    steps:
      - name: Bersihkan Lingkungan
        run: |
          sudo systemctl stop apache2 nginx mysql || true
          sudo rm -rf /var/www /etc/apache2 /etc/nginx || true

      - name: Install & Setup Environment
        run: |
          sudo apt-get update
          sudo apt-get install -y git p7zip-full curl wget unzip
          sudo systemctl enable --now docker

      - name: Instalasi Coolify (Metode Paksa Root)
        run: |
          echo "Menginstal Coolify dengan akses root paksa..."
          curl -fsSL https://cdn.coollabs.io/coolify/install.sh | sudo -E bash
          sleep 60

      - name: Setup Bot
        run: |
          curl -fsSL https://deb.nodesource.com/setup_lts.x | sudo -E bash -
          sudo apt-get install -y nodejs
          sudo npm install -g pm2
          mkdir -p ~/WABot
          cd ~/WABot
          npm init -y
          npm install @whiskeysockets/baileys pino readline @google/generative-ai
          touch index.js
          echo "// Edit file bot lu di sini" > index.js

      - name: Konfigurasi Akses Tailscale
        run: |
          curl -fsSL https://tailscale.com/install.sh | sh
          sudo tailscale up --authkey=${{ secrets.TAILSCALE_AUTH_KEY }} --hostname=gh-runner-${GITHUB_RUN_ID} --ssh
          
          tsIP=""
          while [ -z "$tsIP" ]; do tsIP=$(tailscale ip -4); sleep 5; done
          
          echo -e "\n=========================================="
          echo "         AKSES COOLIFY & SISTEM           "
          echo "=========================================="
          echo "Coolify UI : http://$tsIP:8000"
          echo "SSH Host   : $tsIP"
          echo "=========================================="

      - name: Menjalankan Bot
        run: |
          cd ~/WABot
          pm2 start index.js --name "NaveBot"
          while true; do sleep 300; done
